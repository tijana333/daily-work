<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Work</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div id="header-content">
          <h1 id="logo">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              data-lucide="sparkles"
              aria-hidden="true"
              class="lucide-sparkles">
              <path
                d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path>
              <path d="M20 2v4"></path>
              <path d="M22 4h-4"></path>
              <circle cx="4" cy="20" r="2"></circle>
            </svg>
            Daily Work
          </h1>
          <p>Track your progress, one day at a time</p>
        </div>
      </header>
      <nav class="tabs">
        <button class="tab active" id="button1" data-tab="today">
          <svg
            class="button-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true">
            <path d="M13 21h8" />
            <path
              d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
          </svg>

          <span>Today</span>
        </button>

        <button class="tab" id="button2" data-tab="overview">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            data-lucide="calendar"
            aria-hidden="true"
            class="button-icon">
            <path d="M8 2v4"></path>
            <path d="M16 2v4"></path>
            <rect width="18" height="18" x="3" y="4" rx="2"></rect>
            <path d="M3 10h18"></path>
          </svg>
          <span>Overview</span>
        </button>

        <button class="tab" id="button3" data-tab="entries">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            data-lucide="list"
            aria-hidden="true"
            class="button-icon">
            <path d="M3 5h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 19h.01"></path>
            <path d="M8 5h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 19h13"></path>
          </svg>
          <span>Entries</span>
        </button>
      </nav>
      <div id="today-section" class="tab-content active">
        <h2>Log Today's Work</h2>
          <div id="success-message">Entry created successfully!</div>
          <div id="server-error"></div>
        <div class="form-card">
          <form id="entry-form">
            <div class="form-group">
              <div class="form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="calendar" aria-hidden="true" class="lucide lucide-calendar label-icon"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg>
              <label for="date"> Date <span class="required">*</span></label>
              </div>
              <input id="date" type="date" name="date" value="2026-02-13"/>
              <span id="date-error" class="catch-error"></span>
            </div>

            <div class="form-group">
              <div class="form-label">
              <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="clock" aria-hidden="true" class="lucide lucide-clock label-icon"><path d="M12 6v6l4 2"></path><circle cx="12" cy="12" r="10"></circle></svg>
              <label for="number">Hours worked <span class="required">*</span></label>
              </div>
              <input id="number" type="number" name="number" min="0" step="0.5" placeholder="e.g., 8"/>
              <span id="hours-error" class="catch-error"></span>
            </div>
            <div class="form-group">
             <div class="form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="zap" aria-hidden="true" class="lucide lucide-zap label-icon"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"></path></svg>
              <label>Intensity</label>
              </div>
              <div class="buttons">
              <button type="button" class="intensity-button">
                <span class="tab-number">1</span>
                <span class="tab-text">Light</span>
              </button>
              <button type="button" class="intensity-button">
                <span class="tab-number">2</span>
                <span class="tab-text">Easy</span>
              </button>
              <button type="button" class="intensity-button">
                <span class="tab-number">3</span>
                <span class="tab-text">Moderate</span>
              </button>
              <button type="button" class="intensity-button">
                <span class="tab-number">4</span>
                <span class="tab-text">Intense</span>
                </button>
              <button type="button" class="intensity-button">
                <span class="tab-number">5</span>
                <span class="tab-text">Maximum</span>
              </button>
            </div>
            </div>
            <div class="form-group">
              <div class="form-label"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="target" aria-hidden="true" class="lucide lucide-target label-icon"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                <label for="text">Today's challenge <span class="required">*</span></label>
              </div>
              <input type="text" id="text" name ="text" placeholder="What was the main challenge today?">
              <span id="challenge-error" class="catch-error"></span>
            </div>
            <div class="form-group">
              <div class="form-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="message-circle" aria-hidden="true" class="lucide lucide-message-circle label-icon"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"></path></svg>
              <label for="note">Personal note</label>
              </div>
              <textarea id="note" name="note" rows="5" placeholder="How are you feeling? Any reflections?"></textarea>
              <span id="note-error" class="catch-error"></span>
            </div>

            <div class="form-group">
              <button type="submit" class="button-form">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="save" aria-hidden="true"  class="lucide lucide-save label-icon-button"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"></path><path d="M7 3v4a1 1 0 0 0 1 1h7"></path></svg>
              <span>Save Entry</span>
              </button>
            </div>
            </div>

            </div>
          </form>
        </div>
      </div>
      <div id="overview-section" class="tab-content">
        <div class="row">
          <h2>Monthly Overview</h2>
          <p id="paragraph-section">Your work pattern at a glance</p>
        </div>
      </div>
      <div id="entries-section" class="tab-content">
        <h2>Work Entries</h2>
       <div id="entries-list"></div>
      </div>
    </div>
    <!-- JavaScript -->
    <script src="index.js"></script>
  </body>
</html>
